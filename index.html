<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>39 Puan Satranç</title>

<style>
body { font-family: Arial; text-align:center; background:#f3f4f6; }

.board {
  display:grid;
  grid-template-columns: repeat(8, 70px);
  width:560px;
  margin:20px auto;
}

.cell {
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}

.white { background:#eee; }
.black { background:#666; color:white; }

.panel { margin:10px; }
button { margin:5px; padding:10px; }
</style>

</head>

<body>

<h2>39 Puan Satranç</h2>

<div class="panel">
<button onclick="select('P')">Piyon</button>
<button onclick="select('N')">At</button>
<button onclick="select('B')">Fil</button>
<button onclick="select('R')">Kale</button>
<button onclick="select('Q')">Vezir</button>
<button onclick="select('K')">Şah</button>
<button onclick="removeMode()">Sil</button>
</div>

<p id="status">Beyaz yerleşiyor</p>
<p>Puan: <span id="score">0</span> / 39</p>

<button onclick="next()">Yerleşimi Bitir</button>

<div id="board" class="board"></div>

<script>
let selected=null;
let phase="white";
let score={w:0,b:0};

const values={P:1,N:3,B:3,R:5,Q:9,K:0};

let board=[];

function init(){
  board=[];
  for(let i=0;i<64;i++) board.push("");
  draw();
}

function select(p){ selected=p; }
function removeMode(){ selected="remove"; }

function draw(){
  let b=document.getElementById("board");
  b.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let i=r*8+c;
      let d=document.createElement("div");

      d.className="cell "+((r+c)%2==0?"white":"black");
      d.innerText=board[i];

      d.onclick=()=>clickCell(i,r);

      b.appendChild(d);
    }
  }
}

function clickCell(i,row){
  let color = phase==="white"?"w":"b";

  if(phase==="white" && row>1) return;
  if(phase==="black" && row<6) return;

  if(selected==="remove"){
    if(board[i]!=""){
      score[color]-=values[board[i]];
      board[i]="";
      update();
    }
    return;
  }

  if(!selected) return;

  if(score[color]+values[selected]>39){
    alert("39 puanı geçemezsin");
    return;
  }

  board[i]=selected;
  score[color]+=values[selected];

  update();
}

function update(){
  draw();
  let c = phase==="white"?"w":"b";
  document.getElementById("score").innerText=score[c];
}

function next(){
  if(phase==="white"){
    phase="black";
    document.getElementById("status").innerText="Siyah yerleşiyor";
    document.getElementById("score").innerText=score.b;
  } else {
    alert("Kurulum bitti (oyun motoru olmadan sadece yerleşim)");
  }
}

init();
</script>

</body>
</html>
